# =============================================================================
# HorizontalPodAutoscaler — auto-scaling selon la charge CPU
# =============================================================================

# Shortener service : scale de 2 à 5 replicas si CPU > 70%
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: shortener-hpa
  namespace: urlshort
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: shortener-service
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
# Analytics service : scale de 2 à 5 replicas si CPU > 70%
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: analytics-hpa
  namespace: urlshort
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: analytics-service
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
