apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-shortener-pvc
  namespace: urlshort
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-shortener
  namespace: urlshort
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-shortener
  template:
    metadata:
      labels:
        app: postgres-shortener
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: urlshortener
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-shortener-secret
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-shortener-secret
                  key: password
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "shortener_user", "-d", "urlshortener"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-shortener-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-shortener
  namespace: urlshort
spec:
  selector:
    app: postgres-shortener
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-shortener-secret
  namespace: urlshort
type: Opaque
stringData:
  username: shortener_user
  password: shortener_pass_2024
